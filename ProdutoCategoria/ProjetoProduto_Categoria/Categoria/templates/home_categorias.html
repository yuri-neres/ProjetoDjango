{% block title %} Menu de Categorias {% endblock %}

{% block content %}
<style>
    .page-title {
        text-align: center;
        color: #2c3e50;
        font-family: Arial, Helvetica, sans-serif;
        margin-bottom: 30px;
        margin-top: 40px;
    }

    .menu-container {
        font-family: Arial, Helvetica, sans-serif;
        background: white;
        max-width: 400px;
        margin: 0 auto;
        padding: 40px 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 15px; 
    }

    .btn-menu {
        display: block; 
        padding: 15px 20px;
        text-decoration: none;
        color: white;
        border-radius: 4px;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.2s;
    }

    .btn-criar {
        background: #27ae60;
    }
    .btn-criar:hover {
        background: #2ecc71;
    }

    .btn-listar {
        background: #3498db;
    }
    .btn-listar:hover {
        background: #2980b9;
    }

    .btn-retornar {
        background: #95a5a6;
        margin-top: 15px;
    }
    .btn-retornar:hover {
        background: #7f8c8d;
    }
</style>

<h1 class="page-title">Gerenciar Categorias</h1>

<div class="menu-container">
    
    <a href="/categorias/criar/" class="btn-menu btn-criar">+ Criar Categoria</a>
    
    <a href="/categorias/listar/" class="btn-menu btn-listar">Listar Categorias</a>
    
    <a href="/" class="btn-menu btn-retornar">Retornar</a>

</div>
{% endblock %}
