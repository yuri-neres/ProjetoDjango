{% block title %} Criar Produto {% endblock %}

{% block content %}
{% if erro %}
    <div style="color: red; font-weight: bold;">
        {{ erro }}
    </div>
{% endif %}
<div>
    <h4>{% if produto %}Editar {{ produto.nome }}{% else %}Novo Produto{% endif %}</h4>
    <form method="post">
        {% csrf_token %}

        <div>
            <label for="nome">{{ label_nome }} *</label>
            <input type="text" id="nome" name="nome" value="{{ produto.nome|default:'' }}" required>
        </div>

        <div>
            <label for="descricao">{{ label_descricao }} *</label>
            <textarea id="descricao" name="descricao" rows="4">{{ produto.descricao|default:'' }} </textarea> 
        </div>

        <div>
            <input type="checkbox" id="ativo" name="ativo" {% if categoria.ativo or not categoria %}checked{% endif %} required>
            <label for="ativo">{{ label_ativo }}</label>
        </div>

        <div>
            <button type="submit">Salvar</button>
        </div>
    </form>
</div>

<div>
    <form action="/categorias">
        <button type="submit">Cancelar</button>
    </form>
</div>
{% endblock %}
