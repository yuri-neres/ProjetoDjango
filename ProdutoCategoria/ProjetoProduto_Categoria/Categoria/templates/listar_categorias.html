<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            margin: 40px;
        }

        h1{
            text-align: center;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td{
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th{
            background: #2c3e50;
            color: white;
        }

        tr:hover{
            background: #f1f1f1;
        }

        .btn{
            padding: 6px 12px;
            text-decoration: none;
            color: white;
            background: #3498db;
            border-radius: 4px;
        }

        .btn-delete{
            background: #e74c3c;
        }

    </style>
</head>
<body>

<h1>Lista de Produtos</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>descricao</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>

        {% for categoria in categorias %}
        <tr>
            <td>{{ categoria.id_categoria }}</td>
            <td>{{ categoria.nome }}</td>
            <td>{{ categoria.descricao }}</td>
            <td>{{ categoria.ativo }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">Nenhuma categoria cadastrada</td>
        </tr>
        {% endfor %}

    </tbody>
</table>

    <br>

    <div>
        <form action="/categorias">
            <button type="submit">Retornar</button>
        </form>
    </div>

</body>

</html>
