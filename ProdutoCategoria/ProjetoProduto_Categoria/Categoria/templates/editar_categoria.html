<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Categoria</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            margin: 40px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .form-container {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-container input {
            transform: scale(1.2);
        }

        .botoes {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            text-decoration: none;
            color: white;
            background: #27ae60;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background: #2ecc71;
        }

        .btn-cancel {
            background: #95a5a6;
            margin-left: 10px;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
        }

        .mensagem-erro {
            color: #e74c3c;
            background: #fadbd8;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>Editar Categoria</h1>

    <div class="form-container">
        {% if erro %}
            <div class="mensagem-erro">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            
            {% csrf_token %} 

            <div class="form-group">
                <label for="nome">{{ label_nome }}</label>
                <input type="text" id="nome" name="nome" value="{{ categoria.nome }}" required>
            </div>

            <div class="form-group">
                <label for="descricao">{{ label_descricao }}</label>
                <textarea id="descricao" name="descricao" rows="4">{{ categoria.descricao }}</textarea>
            </div>

            <div class="form-group checkbox-container">
                <input type="checkbox" id="ativo" name="ativo" {% if categoria.ativo %}checked{% endif %}>
                <label for="ativo" style="margin-bottom: 0;">{{ label_ativo }}</label>
            </div>

            <div class="botoes">
                <button type="submit" class="btn">Salvar Alterações</button>
                <a href="/categorias/listar/" class="btn btn-cancel">Cancelar</a>
            </div>

        </form>
    </div>

</body>
</html>
