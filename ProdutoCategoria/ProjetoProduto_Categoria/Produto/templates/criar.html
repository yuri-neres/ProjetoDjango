{% block title %} Criar Produto {% endblock %}

{% block content %}
{% if erro %}
    <div style="color: red; font-weight: bold;">
        {{ erro }}
    </div>
{% endif %}
<div>
    <h4>{% if produto %}Editar {{ produto.nome }}{% else %}Novo Produto{% endif %}</h4>
    <form method="post">
        {% csrf_token %}

        <div>
            <label for="nome">{{ label_nome }} *</label>
            <input type="text" id="nome" name="nome" value="{{ produto.nome|default:'' }}" required>
        </div>

        <div>
            <label for="preco">{{ label_preco }} *</label>
            <input type="number" step="0.01" id="preco" name="preco" value="{{ produto.preco|default:'' }}" required>
        </div>

        <div>
            <label for="estoque">{{ label_estoque }}</label>
            <input type="number" id="estoque" name="estoque" value="{{ produto.estoque|default:'' }}">
        </div>

        <div>
            <label for="descricao">{{ label_descricao }}</label>
            <textarea id="descricao" name="descricao" rows="4">{{ produto.descricao|default:'' }}</textarea>
        </div>

        <div>
            <label for="categoria">{{ label_categoria }} *</label>
    
            <select id="categoria" name="categoria" required>
        
            <option value="" selected>Selecione uma categoria...</option>
        
            {% for cat in categorias %}
                <option value="{{ cat.pk }}">
                    {{ cat.nome }}
                </option>
            {% endfor %}
        
        </select>
        </div>

        <div>
            <input type="checkbox" id="ativo" name="ativo" {% if produto.ativo or not produto %}checked{% endif %}>
            <label for="ativo">{{ label_ativo }}</label>
        </div>

        <div>
            <button type="submit">Salvar</button>
        </div>
    </form>
</div>

<div>
    <form action="/produtos">
        <button type="submit">Cancelar</button>
    </form>
</div>
{% endblock %}
