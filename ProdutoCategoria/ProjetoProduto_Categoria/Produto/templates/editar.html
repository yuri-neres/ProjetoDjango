{% block title %} Editar Produto {% endblock %}

{% load l10n %}

{% block content %}
<style>
    .page-title {
        text-align: center;
        color: #2c3e50;
        font-family: Arial, Helvetica, sans-serif;
        margin-bottom: 30px;
        margin-top: 40px;
    }

    .form-container {
        font-family: Arial, Helvetica, sans-serif;
        background: white;
        max-width: 600px; 
        margin: 0 auto;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 8px;
        color: #333;
    }

    input[type="text"], 
    input[type="number"], 
    textarea, 
    select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
    }

    input:focus, textarea:focus, select:focus {
        border-color: #3498db;
        outline: none;
    }

    .checkbox-container {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
    }

    .checkbox-container input {
        transform: scale(1.2);
    }

    .checkbox-container label {
        margin-bottom: 0;
        font-weight: normal;
    }

    .botoes {
        text-align: center;
        margin-top: 35px;
    }

    .btn {
        display: inline-block;
        padding: 10px 20px;
        text-decoration: none;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
    }

    .btn-salvar { background: #27ae60; }
    .btn-salvar:hover { background: #2ecc71; }
    .btn-cancel { background: #95a5a6; margin-left: 10px;}
    .btn-cancel:hover { background: #7f8c8d; }

    .mensagem-erro {
        color: #e74c3c;
        background: #fadbd8;
        padding: 12px;
        border-radius: 4px;
        text-align: center;
        font-weight: bold;
        margin-bottom: 25px;
    }
</style>

<h1 class="page-title">Editar: {{ produto.nome }}</h1>

<div class="form-container">
    {% if erro %}
        <div class="mensagem-erro">{{ erro }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="nome">{{ label_nome }} *</label>
            <input type="text" id="nome" name="nome" value="{{ produto.nome }}" required>
        </div>
        
        <div class="form-group">
            <label for="preco">{{ label_preco }} *</label>
            <input type="number" step="0.01" id="preco" name="preco" value="{{ produto.preco|unlocalize }}" required>
        </div>
        
        <div class="form-group">
            <label for="estoque">{{ label_estoque }}</label>
            <input type="number" id="estoque" name="estoque" value="{{ produto.estoque }}">
        </div>
        
        <div class="form-group">
            <label for="descricao">{{ label_descricao }}</label>
            <textarea id="descricao" name="descricao" rows="4">{{ produto.descricao }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="categoria">{{ label_categoria }} *</label>
            <select id="categoria" name="categoria" required>
                <option value="">Selecione uma categoria...</option>
                
                {% for cat in categorias %}
                    <option value="{{ cat.id_categoria }}" {% if produto.categoria.id_categoria == cat.id_categoria %}selected{% endif %}>
                        {{ cat.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group checkbox-container">
            <input type="checkbox" id="ativo" name="ativo" {% if produto.ativo %}checked{% endif %}>
            <label for="ativo">{{ label_ativo }}</label>
        </div>
        
        <div class="botoes">
            <button type="submit" class="btn btn-salvar">Salvar Alterações</button>
            <a href="/produtos/listar/" class="btn btn-cancel">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
