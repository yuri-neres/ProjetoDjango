<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            margin: 40px;
        }

        h1{
            text-align: center;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td{
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th{
            background: #2c3e50;
            color: white;
        }

        tr:hover{
            background: #f1f1f1;
        }

        .btn{
            padding: 6px 12px;
            text-decoration: none;
            color: white;
            background: #3498db;
            border-radius: 4px;
        }

        .btn-delete{
            background: #e74c3c;
        }

    </style>
</head>
<body>

<h1>Lista de Produtos</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Quantidade</th>
        </tr>
    </thead>

    <tbody>

        {% for produto in produtos %}
        <tr>
            <td>{{ produto.id }}</td>
            <td>{{ produto.nome }}</td>
            <td>R$ {{ produto.preco }}</td>
            <td>{{ produto.estoque }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">Nenhum produto cadastrado</td>
        </tr>
        {% endfor %}

    </tbody>
</table>

</body>
</html>
